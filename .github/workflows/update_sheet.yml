name: Auto Fetch Stock Data

on:
  schedule:
    # Chạy vào 00:00 UTC (7:00 AM VN) từ Thứ 2 đến Thứ 6
    - cron: '0 0 * * 1-5' 
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Script
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }} 
        run: python main.py
